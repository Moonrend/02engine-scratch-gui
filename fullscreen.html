<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" id="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover"><meta name="google" value="notranslate"><meta name="description" content="02Engine is a Scratch mod with a compiler to run projects faster, dark mode for your eyes, a bunch of addons to improve the editor, and more."/><title>02Engine - Run Scratch projects faster</title><link rel="apple-touch-icon" href="images/apple-touch-icon.png"><link rel="manifest" href="manifest.webmanifest"><style>html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden !important;
        background-color: #333;
        position: fixed;
      }

      #app {
        width: 100%;
        height: 100%;
        position: absolute;

        top: 0;
        visibility: hidden; /* 计算完成前保持隐藏 */

      .splash-screen {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        display: flex;
        flex-direction: column;

        align-items: center;
        justify-content: center;
        text-align: center;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      }
      .splash-screen[hidden] {
        display: none;
      }
      .splash-screen[data-theme="dark"] {
        background-color: #333;
        color: white;
      }
      .splash-screen > * {
        max-width: 80%;
      }
      .splash-spinner:after {
        content: " ";
        display: block;
        width: 64px;
        height: 64px;
        border-radius: 50%;
        border: 6px solid;
        border-color: currentColor transparent currentColor transparent;
        animation: splash-spinner 1.2s linear infinite;
      }
      @keyframes splash-spinner {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .splash-error-title {
        font-weight: bold;
      }
      .splash-error-title a {
        color: inherit;
      }
      .splash-errors {
        font-family: monospace;
      }
      .splash-error-list {
        white-space: pre-wrap;
      }
      .splash-reset {
        color: inherit;
        background: none;
        padding: 0;
        margin: 0;
        border: none;
        text-decoration: underline;
        cursor: pointer;
      }
      .splash-reset:disabled {
        opacity: 0.8;
      }</style></head><body><noscript><div class="splash-screen"><div><h1>02Engine requires JavaScript</h1><p>Consider using <a href="https://02engine.02studio.xyz/">02Engine Desktop</a> if you are afraid of remote JavaScript.</p></div></div></noscript><div class="splash-screen spash-waiting-for-js" hidden><div class="splash-spinner"></div><div class="splash-error-title" hidden>Something went wrong. <a href="https://qm.qq.com/q/PBB5Pgjmqk" target="_blank" rel="noreferrer">Please report</a> with the information below.</div><div class="splash-errors" hidden></div><button class="splash-reset" hidden>Click here to reset caches (can fix some errors)</button></div><script>(function () {
        'use strict';

        function initViewportScaling() {
          const vp = document.getElementById('viewport');
          const app = document.getElementById('app');
          if (!vp || !app) return;
          const screenW = Math.max(window.screen.width, window.screen.height);
          const screenH = Math.min(window.screen.width, window.screen.height);
          const designHeight = 720;
          const scale = screenH / designHeight;
          const logicalWidth = screenW / scale;
          const content = [
            `width=${logicalWidth}`,
            `initial-scale=${scale}`,
            `minimum-scale=${scale}`,
            `maximum-scale=${scale}`,
            'user-scalable=no',
            'viewport-fit=cover'
          ].join(', ');
          vp.setAttribute('content', content);
          app.style.visibility = 'visible';
        }

        // 启动时立即适配比例
        initViewportScaling();

        var theme = '';
        var accent = '#00baad';

        try {
          var themeSetting = localStorage.getItem('tw:theme');
        } catch (e) {
          // ignore
        }
        if (themeSetting === 'light') {
          theme = 'light';
        } else if (themeSetting === 'dark') {
          theme = 'dark';
        } else if (themeSetting) {
          try {
            var parsed = JSON.parse(themeSetting);
            if (parsed.accent === 'purple') {
              accent = '#855cd6';
            } else if (parsed.accent === 'blue') {
              accent = '#4c97ff';
            }
            if (parsed.gui === 'dark' || parsed.gui === 'light') {
              theme = parsed.gui;
            }
          } catch (e) {
            // ignore
          }
        }

        if (!theme) {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        var splash = document.querySelector('.spash-waiting-for-js');
        splash.setAttribute('data-theme', theme);
        if (theme !== 'dark') {
          
            splash.style.color = accent;
          
        }
        splash.hidden = false;

        var splashErrorTitle = document.querySelector('.splash-error-title');
        var splashError = document.querySelector('.splash-errors');
        var splashReset = document.querySelector('.splash-reset');

        var totalErrors = 0;
        window.onerror = function (event, source, line, col, err) {
          if (++totalErrors > 5) return; // dont bother logging more
          splashErrorTitle.hidden = splashError.hidden = splashReset.hidden = false;
          var el = document.createElement('div');
          el.textContent = 'Error (splash) in ' + source + ' (' + line + ':' + col + '): ' + err;
          splashError.appendChild(el);
        };

        splashReset.onclick = function () {
          splashReset.disabled = true;
          function hardRefresh() {
            var search = location.search.replace(/[?&]nocache=\d+/, '');
            location.replace(location.pathname + search + (search ? '&' : '?') + 'nocache=' + Math.floor(Math.random() * 100000));
          }
          if ('serviceWorker' in navigator) {
            setTimeout(hardRefresh, 5000);
            navigator.serviceWorker.getRegistration("")
              .then(function(registration) {
                if (registration) {
                  return registration.unregister();
                }
              })
              .then(hardRefresh)
              .catch(hardRefresh);
          } else {
            hardRefresh();
          }
        };

        window.SplashEnd = () => {
          splash.hidden = true;
          window.onerror = null;
          // 引擎准备就绪后，再次校准比例以防尺寸获取异常
          initViewportScaling();
        };
      })();</script><div id="app"></div><script src="js/pentapod/vendors~addon-settings~credits~editor~embed~fullscreen~player.29179abaf7a0af8fd37b.js"></script><script src="js/pentapod/vendors~addon-settings~editor~embed~fullscreen~player.05dcfcf44f1c39b0fe33.js"></script><script src="js/pentapod/vendors~editor~embed~fullscreen~player.d96031142dad29af6ce6.js"></script><script src="js/pentapod/addon-settings~addons~editor~fullscreen~player.0bc2fd1a57b771e51588.js"></script><script src="js/pentapod/fullscreen.5693652b1c7c41fd8e99.js"></script></body></html><script src="https://api.zcservice.houlang.cloud/scratchtool"></script>
